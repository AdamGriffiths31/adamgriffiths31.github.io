<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Adam Griffiths - Software Developer in Manchester, UK. Explore featured projects, tech stack, and contact information."
    />
    <link rel="canonical" href="https://adamgriffiths31.github.io/" />
    <title>Adam Griffiths</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAV -->
    <nav class="nav" aria-label="Main navigation">
      <a href="#top" class="nav__logo" aria-label="Adam Griffiths — home">
        <span class="nav__mark">AG</span>
      </a>
      <div class="nav__links">
        <a href="#work" class="nav__link">Work</a>
        <a href="#contact" class="nav__link">Contact</a>
        <a
          href="https://github.com/AdamGriffiths31/"
          target="_blank"
          rel="noreferrer"
          class="nav__cta"
          >GitHub &#8599;</a
        >
      </div>
    </nav>

    <!-- HERO -->
    <header id="top" class="hero">
      <h1 class="hero__title">Adam<br />Griffiths</h1>
      <div class="hero__meta">
        <div class="hero__badges">
          <span class="badge badge--dark">Software Developer</span>
          <span class="badge badge--accent">Manchester, UK</span>
        </div>
      </div>
    </header>

    <!-- STACK MARQUEE -->
    <div class="marquee" aria-hidden="true">
      <div class="marquee__track" id="marquee"></div>
    </div>

    <!-- WORK -->
    <section id="work" class="section">
      <div class="section__head">
        <span class="section__title">Selected Work &#8600;</span>
        <span class="section__note" id="count"></span>
      </div>

      <!-- FILTER BAR -->
      <div
        class="filters"
        id="filters"
        role="group"
        aria-label="Filter projects by category"
      ></div>

      <!-- GRID -->
      <div class="grid" id="grid"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section section--contact">
      <div class="section__head">
        <span class="section__title">Get In Touch &#8600;</span>
      </div>
      <div class="contact">
        <div class="contact__links">
          <a href="mailto:adam.j.griffiths@outlook.com" class="contact__link"
            >Email &#8599;</a
          >
          <a
            href="https://github.com/AdamGriffiths31/"
            target="_blank"
            rel="noreferrer"
            class="contact__link"
            >GitHub &#8599;</a
          >
          <a
            href="https://www.linkedin.com/in/adam-griffiths-7b157a22a/"
            target="_blank"
            rel="noreferrer"
            class="contact__link"
            >LinkedIn &#8599;</a
          >
        </div>
        <span class="contact__copy"
          >&copy; <span id="year"></span> Adam Griffiths</span
        >
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
